<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#084f9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hourglass shape with gradient -->
  <g filter="url(#glow)">
    <!-- Top part of hourglass -->
    <path d="M 200 150 Q 150 150 150 220 L 150 380 Q 150 450 250 500 Q 150 550 150 620 L 150 780 Q 150 850 200 850 L 800 850 Q 850 850 850 780 L 850 620 Q 850 550 750 500 Q 850 450 850 380 L 850 220 Q 850 150 800 150 Z" fill="url(#grad1)" stroke="none"/>
    
    <!-- Light rays from sand -->
    <circle cx="500" cy="500" r="60" fill="#fbbf24" opacity="0.6"/>
    <g stroke="#fbbf24" stroke-width="8" stroke-linecap="round" opacity="0.5">
      <line x1="500" y1="380" x2="500" y2="300"/>
      <line x1="580" y1="420" x2="630" y2="370"/>
      <line x1="420" y1="420" x2="370" y2="370"/>
      <line x1="500" y1="620" x2="500" y2="700"/>
      <line x1="580" y1="580" x2="630" y2="630"/>
      <line x1="420" y1="580" x2="370" y2="630"/>
    </g>
  </g>
</svg>